<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>酒池肉らうど 注文管理</title>
  <style>
    :root {
      --bg: #fff8ec;
      --surface: #ffffff;
      --surface-strong: #fff1d6;
      --text: #231815;
      --muted: #6f625b;
      --line: #e8d8c4;
      --brand: #d94a1e;
      --brand-dark: #a83012;
      --accent: #0f766e;
      --warning: #d70000;
      --warning-bg: #fff0f0;
      --shadow: 0 10px 24px rgba(75, 45, 22, 0.12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100%;
      margin: 0;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(180deg, #fff5df 0%, #fffaf2 42%, #f7fbf8 100%);
    }

    button {
      border: 0;
      border-radius: var(--radius);
      font: inherit;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    button:focus-visible {
      outline: 4px solid rgba(15, 118, 110, 0.34);
      outline-offset: 2px;
    }

    .app {
      width: min(100%, 1100px);
      margin: 0 auto;
      padding: 14px 12px 24px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: -14px -12px 12px;
      padding: 12px;
      background: rgba(255, 248, 236, 0.95);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .brand {
      min-width: 0;
    }

    .brand-title {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .brand-sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.3;
    }

    .current-badge {
      flex: 0 0 auto;
      min-width: 96px;
      padding: 10px 12px;
      text-align: center;
      color: #fff;
      background: var(--brand);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }

    .current-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      opacity: 0.9;
    }

    .current-number {
      display: block;
      margin-top: 2px;
      font-size: 2.15rem;
      font-weight: 900;
      line-height: 1;
    }

    .layout {
      display: grid;
      gap: 12px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px;
      background: var(--surface-strong);
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      margin: 0;
      font-size: 1rem;
      line-height: 1.2;
    }

    .order-count {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .number-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
    }

    .number-button {
      position: relative;
      min-height: 54px;
      background: #fff;
      border: 2px solid #ead7bd;
      font-size: 1.18rem;
      font-weight: 850;
      box-shadow: 0 3px 0 #ead7bd;
    }

    .number-button.has-order {
      color: #0f5132;
      background: #dcfce7;
      border-color: #78c79d;
      box-shadow: 0 3px 0 #78c79d;
    }

    .number-button.selected {
      color: #fff;
      background: var(--brand);
      border-color: var(--brand-dark);
      box-shadow: 0 3px 0 var(--brand-dark);
      transform: translateY(1px);
    }

    .number-button.has-order::after {
      content: "";
      position: absolute;
      top: 7px;
      right: 7px;
      width: 9px;
      height: 9px;
      background: #16a34a;
      border-radius: 999px;
    }

    .number-button.selected::after {
      background: #fff;
    }

    .work-area {
      display: grid;
      gap: 12px;
    }

    .menu-grid {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .menu-button {
      min-height: 68px;
      padding: 12px 14px;
      color: #fff;
      background: var(--brand);
      font-size: 1.08rem;
      font-weight: 850;
      line-height: 1.25;
      text-align: left;
      box-shadow: 0 4px 0 var(--brand-dark);
    }

    .menu-button:active,
    .clear-button:active,
    .qty-button:active,
    .next-button:active,
    .number-button:active {
      transform: translateY(2px);
      box-shadow: none;
    }

    .menu-button.secondary {
      background: var(--accent);
      box-shadow: 0 4px 0 #0b514c;
    }

    .menu-button.set {
      background: #5b3b82;
      box-shadow: 0 4px 0 #3d2758;
    }

    .warning {
      display: none;
      margin: 12px 12px 0;
      padding: 14px;
      color: #fff;
      background: var(--warning);
      border: 3px solid #8c0000;
      border-radius: var(--radius);
      font-size: 1.1rem;
      font-weight: 900;
      line-height: 1.35;
      text-align: center;
      box-shadow: 0 0 0 4px rgba(215, 0, 0, 0.13);
    }

    .warning.show {
      display: block;
    }

    .order-list {
      display: grid;
      gap: 8px;
      padding: 12px;
    }

    .empty-state {
      margin: 0;
      padding: 24px 12px;
      color: var(--muted);
      background: #fffaf3;
      border: 2px dashed #dfcbb3;
      border-radius: var(--radius);
      font-weight: 700;
      text-align: center;
    }

    .order-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 64px;
      padding: 10px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .item-name {
      min-width: 0;
      font-size: 1.06rem;
      font-weight: 850;
      line-height: 1.3;
    }

    .qty-controls {
      display: grid;
      grid-template-columns: 48px 54px 48px;
      gap: 6px;
      align-items: center;
    }

    .qty-button {
      width: 48px;
      height: 48px;
      color: #fff;
      background: #4b5563;
      font-size: 1.5rem;
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 3px 0 #2f3742;
    }

    .qty-button.plus {
      background: var(--accent);
      box-shadow: 0 3px 0 #0b514c;
    }

    .qty {
      min-width: 54px;
      text-align: center;
      font-size: 1.18rem;
      font-weight: 900;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid var(--line);
      background: #fffaf3;
    }

    .clear-button,
    .next-button {
      min-height: 58px;
      padding: 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 900;
      box-shadow: 0 4px 0 #7f1d1d;
    }

    .clear-button {
      background: #b91c1c;
    }

    .clear-button:disabled {
      color: #8a817a;
      background: #e7ddd2;
      box-shadow: none;
      cursor: not-allowed;
    }

    .next-button {
      background: #374151;
      box-shadow: 0 4px 0 #1f2937;
    }

    .footer-note {
      margin: 10px 2px 0;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.45;
      text-align: center;
    }

    @media (min-width: 620px) {
      .app {
        padding: 18px;
      }

      .topbar {
        margin: -18px -18px 16px;
        padding: 14px 18px;
      }

      .layout {
        grid-template-columns: 280px 1fr;
        align-items: start;
      }

      .numbers-panel {
        position: sticky;
        top: 92px;
      }

      .number-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .menu-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .menu-button.set {
        grid-column: span 2;
      }

      .actions {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (min-width: 900px) {
      .layout {
        grid-template-columns: 360px 1fr;
      }

      .number-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .number-button {
        min-height: 62px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1 class="brand-title">酒池肉らうど</h1>
        <p class="brand-sub">学園祭屋台 注文管理</p>
      </div>
      <div class="current-badge" aria-live="polite">
        <span class="current-label">対応中</span>
        <span class="current-number"><span id="currentNumber">1</span>番</span>
      </div>
    </header>

    <div class="layout">
      <section class="panel numbers-panel" aria-labelledby="numbersTitle">
        <div class="panel-header">
          <h2 class="panel-title" id="numbersTitle">整理番号</h2>
          <span class="order-count" id="activeCount">注文あり 0件</span>
        </div>
        <div class="number-grid" id="numberGrid"></div>
      </section>

      <section class="work-area" aria-label="注文操作">
        <section class="panel" aria-labelledby="menuTitle">
          <div class="panel-header">
            <h2 class="panel-title" id="menuTitle">商品追加</h2>
          </div>
          <div class="menu-grid" id="menuGrid"></div>
        </section>

        <section class="panel" aria-labelledby="orderTitle">
          <div class="panel-header">
            <h2 class="panel-title" id="orderTitle">注文リスト</h2>
            <span class="order-count" id="selectedSummary">0点</span>
          </div>
          <div class="warning" id="alcoholWarning">⚠️ アルパス（アルコールパスポート）確認！</div>
          <div class="order-list" id="orderList"></div>
          <div class="actions">
            <button class="clear-button" type="button" id="clearButton">提供完了（クリア）</button>
            <button class="next-button" type="button" id="nextButton">次の番号へ</button>
          </div>
        </section>
      </section>
    </div>

    <p class="footer-note">注文内容はこの端末のブラウザに自動保存されます。</p>
  </main>

  <script>
    const STORAGE_KEY = "shuchi-niku-orders-v1";
    const TOTAL_NUMBERS = 32;
    const MENU_ITEMS = [
      { id: "beef", name: "牛串", type: "food" },
      { id: "beer", name: "ビール", type: "alcohol" },
      { id: "cola", name: "コーラ", type: "drink" },
      { id: "beef_beer", name: "牛串とビールのセット", type: "alcohol-set" },
      { id: "beef_cola", name: "牛串とコーラのセット", type: "set" }
    ];

    const state = {
      selectedNumber: 1,
      orders: loadOrders()
    };

    const numberGrid = document.getElementById("numberGrid");
    const menuGrid = document.getElementById("menuGrid");
    const orderList = document.getElementById("orderList");
    const currentNumber = document.getElementById("currentNumber");
    const activeCount = document.getElementById("activeCount");
    const selectedSummary = document.getElementById("selectedSummary");
    const alcoholWarning = document.getElementById("alcoholWarning");
    const clearButton = document.getElementById("clearButton");
    const nextButton = document.getElementById("nextButton");

    function loadOrders() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return saved && typeof saved === "object" ? saved : {};
      } catch (error) {
        return {};
      }
    }

    function saveOrders() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.orders));
    }

    function getSelectedOrder() {
      const key = String(state.selectedNumber);
      if (!state.orders[key]) {
        state.orders[key] = {};
      }
      return state.orders[key];
    }

    function cleanupOrder(number) {
      const key = String(number);
      if (!state.orders[key]) return;

      Object.keys(state.orders[key]).forEach((itemId) => {
        if (state.orders[key][itemId] <= 0) {
          delete state.orders[key][itemId];
        }
      });

      if (Object.keys(state.orders[key]).length === 0) {
        delete state.orders[key];
      }
    }

    function hasItems(number) {
      const order = state.orders[String(number)];
      return Boolean(order && Object.values(order).some((count) => count > 0));
    }

    function getItem(itemId) {
      return MENU_ITEMS.find((item) => item.id === itemId);
    }

    function hasAlcohol(order) {
      return Object.keys(order).some((itemId) => {
        const item = getItem(itemId);
        return item && (item.id === "beer" || item.id === "beef_beer") && order[itemId] > 0;
      });
    }

    function selectNumber(number) {
      state.selectedNumber = number;
      render();
    }

    function addItem(itemId) {
      const order = getSelectedOrder();
      order[itemId] = (order[itemId] || 0) + 1;
      cleanupOrder(state.selectedNumber);
      saveOrders();
      render();
    }

    function adjustItem(itemId, delta) {
      const order = getSelectedOrder();
      order[itemId] = (order[itemId] || 0) + delta;
      cleanupOrder(state.selectedNumber);
      saveOrders();
      render();
    }

    function moveToNextNumber() {
      state.selectedNumber = state.selectedNumber === TOTAL_NUMBERS ? 1 : state.selectedNumber + 1;
      render();
    }

    function clearSelectedOrder() {
      const number = state.selectedNumber;
      if (!hasItems(number)) return;

      const confirmed = window.confirm(`${number}番の注文内容を提供完了としてクリアしますか？`);
      if (!confirmed) return;

      delete state.orders[String(number)];
      saveOrders();
      moveToNextNumber();
    }

    function renderNumbers() {
      numberGrid.innerHTML = "";

      for (let number = 1; number <= TOTAL_NUMBERS; number += 1) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "number-button";
        button.textContent = number;
        button.setAttribute("aria-label", `${number}番を選択`);

        if (number === state.selectedNumber) {
          button.classList.add("selected");
          button.setAttribute("aria-current", "true");
        }

        if (hasItems(number)) {
          button.classList.add("has-order");
        }

        button.addEventListener("click", () => selectNumber(number));
        numberGrid.appendChild(button);
      }

      const activeOrders = Array.from({ length: TOTAL_NUMBERS }, (_, index) => index + 1)
        .filter((number) => hasItems(number)).length;
      activeCount.textContent = `注文あり ${activeOrders}件`;
    }

    function renderMenu() {
      menuGrid.innerHTML = "";

      MENU_ITEMS.forEach((item) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "menu-button";
        button.textContent = item.name;

        if (item.type === "drink") {
          button.classList.add("secondary");
        }

        if (item.type === "set" || item.type === "alcohol-set") {
          button.classList.add("set");
        }

        button.addEventListener("click", () => addItem(item.id));
        menuGrid.appendChild(button);
      });
    }

    function renderOrderList() {
      const order = state.orders[String(state.selectedNumber)] || {};
      const entries = MENU_ITEMS
        .filter((item) => order[item.id] > 0)
        .map((item) => ({ ...item, count: order[item.id] }));
      const totalCount = entries.reduce((sum, item) => sum + item.count, 0);

      currentNumber.textContent = state.selectedNumber;
      selectedSummary.textContent = `${totalCount}点`;
      alcoholWarning.classList.toggle("show", hasAlcohol(order));
      clearButton.disabled = entries.length === 0;
      orderList.innerHTML = "";

      if (entries.length === 0) {
        const empty = document.createElement("p");
        empty.className = "empty-state";
        empty.textContent = "この番号の注文はまだありません";
        orderList.appendChild(empty);
        return;
      }

      entries.forEach((item) => {
        const row = document.createElement("div");
        row.className = "order-row";

        const name = document.createElement("div");
        name.className = "item-name";
        name.textContent = `${item.name} × ${item.count}`;

        const controls = document.createElement("div");
        controls.className = "qty-controls";

        const minus = document.createElement("button");
        minus.type = "button";
        minus.className = "qty-button";
        minus.textContent = "−";
        minus.setAttribute("aria-label", `${item.name}を1つ減らす`);
        minus.addEventListener("click", () => adjustItem(item.id, -1));

        const qty = document.createElement("div");
        qty.className = "qty";
        qty.textContent = item.count;

        const plus = document.createElement("button");
        plus.type = "button";
        plus.className = "qty-button plus";
        plus.textContent = "＋";
        plus.setAttribute("aria-label", `${item.name}を1つ増やす`);
        plus.addEventListener("click", () => adjustItem(item.id, 1));

        controls.append(minus, qty, plus);
        row.append(name, controls);
        orderList.appendChild(row);
      });
    }

    function render() {
      renderNumbers();
      renderOrderList();
    }

    clearButton.addEventListener("click", clearSelectedOrder);
    nextButton.addEventListener("click", moveToNextNumber);

    renderMenu();
    render();
  </script>
</body>
</html>
